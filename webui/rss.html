<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>RSS Preview</title>

<style>
body{
    font-family: system-ui, -apple-system, sans-serif;
    background:#f5f5f5;
    padding:20px;
}

h1{
    margin-bottom:16px;
}

input{
    width:100%;
    padding:8px;
    font-size:14px;
    margin-bottom:12px;
}

button{
    padding:8px 16px;
    margin-bottom:20px;
}

.item{
    background:#fff;
    border-radius:8px;
    padding:14px;
    margin-bottom:10px;
    box-shadow:0 1px 4px rgba(0,0,0,.1);
}

.title{
    font-weight:700;
    font-size:15px;
}

.date{
    font-size:12px;
    color:#666;
}

img{
    width:240px;
    margin-top:8px;
    border-radius:6px;
}
.error{
    color:red;
}
</style>
</head>
<body>

<h1>RSS Preview</h1>

<input id="url" value="https://mai.honna-yuzuki.com/api/events/rss">
<button onclick="loadRSS()">Load</button>

<div id="result"></div>

<script>
async function loadRSS(){
    const url = document.getElementById('url').value;
    const result = document.getElementById('result');
    result.innerHTML = 'Loading...';

    try{
        const res = await fetch(url);
        const text = await res.text();

        const parser = new DOMParser();
        const xml = parser.parseFromString(text, "application/xml");

        if(xml.querySelector("parsererror")){
            result.innerHTML = '<div class="error">XML parse error</div><pre>'+text+'</pre>';
            return;
        }

        const items = [...xml.querySelectorAll("item")];

        if(!items.length){
            result.innerHTML = 'item 0件';
            return;
        }

        result.innerHTML = items.map(item=>{
            const title = item.querySelector("title")?.textContent || "";
            const link  = item.querySelector("link")?.textContent || "";
            const desc  = item.querySelector("description")?.textContent || "";
            const date  = item.querySelector("pubDate")?.textContent || "";
            const img   = item.querySelector("enclosure")?.getAttribute("url") || "";

            return `
                <div class="item">
                    <div class="title">
                        <a href="${link}" target="_blank">${title}</a>
                    </div>
                    <div class="date">${date}</div>
                    <div>${desc}</div>
                    ${img ? `<img src="${img}">` : ""}
                </div>
            `;
        }).join("");

    }catch(e){
        result.innerHTML = '<div class="error">'+e+'</div>';
    }
}

loadRSS();
</script>

</body>
</html>
