<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>テスト: カウント結合 / 次の予定</title>
<style>
  :root { --color-primary:#B11E7C; --color-secondary:#7F2534; --color-text:#2c2c3e; }
  body { font-family:"Hiragino Maru Gothic ProN","Segoe UI",system-ui,sans-serif; color:var(--color-text);
    background:#f0f0f4; margin:0; padding:16px; }
  .wrap { max-width:760px; margin:0 auto; }
  h2.marker { color:var(--color-primary); margin:18px 0 6px; }
  .note { font-size:.8rem; color:#888; margin-bottom:10px; }

  /* ===== 次の予定ウィジェット ===== */
  #next-event { display:none; margin:8px 0 20px; padding:14px 16px; border-radius:12px;
    background:linear-gradient(135deg,#fff,#fbeef6); border:1px solid rgba(177,30,124,.18);
    box-shadow:0 3px 12px rgba(177,30,124,.12); }
  #next-event.show { display:block; }
  #next-event .ne-head { display:flex; align-items:center; gap:8px; font-size:.8rem; color:var(--color-primary); font-weight:700; }
  #next-event .ne-badge { background:var(--color-primary); color:#fff; border-radius:999px; padding:2px 10px; font-size:.72rem; }
  #next-event .ne-title { font-size:1.05rem; font-weight:800; margin:6px 0 2px; }
  #next-event .ne-when { font-size:.95rem; color:var(--color-secondary); font-weight:700; }
  #next-event .ne-plat { font-size:.75rem; color:#9a7; margin-left:6px; }
  #next-event a.ne-link { display:inline-block; margin-top:8px; font-size:.82rem; color:var(--color-primary); }

  /* ===== カウント ===== */
  .stats-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:1rem; margin-top:.5rem; }
  .stat-item { position:relative; background-color:#f4f0f8; padding:1rem; border-radius:10px;
    border:1px solid rgba(177,30,124,.12); min-width:0; }
  .stat-item .value { font-size:clamp(1.4rem,3.2vw,2rem); font-weight:800; color:var(--color-primary); line-height:1.25; }
  .stat-item .label { font-size:.9rem; color:var(--color-text); margin-top:.25rem; font-weight:500; }

  /* ペア: PCでは display:contents で中の2つを通常セル扱い（=従来の4セル2×2を維持） */
  .stat-pair { display:contents; }

  /* ===== モバイル ===== */
  @media (max-width:768px) {
    .stats-grid { grid-template-columns:1fr; }
    /* ペアを1枚のカードに結合（左右分割＋仕切り線） */
    .stat-pair { display:flex; background-color:#f4f0f8; border:1px solid rgba(177,30,124,.12);
      border-radius:10px; overflow:hidden; }
    .stat-pair .stat-half { flex:1 1 0; min-width:0; background:transparent; border:none; border-radius:0; padding:.85rem 1rem; }
    .stat-pair .stat-half + .stat-half { border-left:1px solid rgba(177,30,124,.18); }
    .stat-pair .stat-half .value { font-size:clamp(1.15rem,5.5vw,1.6rem); }
    .stat-pair .stat-half .label { font-size:.8rem; }
  }
</style>
</head>
<body>
<div class="wrap">
  <p class="note">テストページ：① 次の予定ウィジェット（予定なしなら非表示） ② スマホ幅(≤768px)でお誕生日＋周年記念を1セル結合。ブラウザ幅を変えて確認してください。</p>

  <!-- 次の予定 -->
  <div id="next-event" aria-live="polite">
    <div class="ne-head"><span class="ne-badge">次の予定</span></div>
    <div class="ne-title" id="ne-title">—</div>
    <div><span class="ne-when" id="ne-when">—</span><span class="ne-plat" id="ne-plat"></span></div>
    <a class="ne-link" id="ne-link" href="#" target="_blank" rel="noopener" style="display:none;">▶ 開く</a>
  </div>

  <h2 class="marker">カウント</h2>
  <div class="stats-grid">
    <div class="stat-item">
      <div class="label">デビューから</div>
      <div class="value" id="days-since-debut">0</div>
    </div>

    <div class="stat-pair">
      <div class="stat-item stat-half">
        <div class="label">お誕生日まで</div>
        <div class="value" id="days-to-birthday">0</div>
      </div>
      <div class="stat-item stat-half">
        <div class="label">周年記念まで</div>
        <div class="value" id="days-to-anniversary">0</div>
      </div>
    </div>

    <div class="stat-item">
      <div class="label">推してから</div>
      <div class="value" id="days-to-meet">0</div>
    </div>
  </div>
</div>

<script>
/* ===== カウント（count-days.js と同ロジック） ===== */
const MS=864e5;
const strip=d=>new Date(d.getFullYear(),d.getMonth(),d.getDate());
const daysSince=d=>Math.floor((strip(new Date())-strip(d))/MS);
const daysDiff=(t,n=new Date())=>Math.floor((strip(t)-strip(n))/MS);
function ym(date,now=new Date()){const s=strip(date),e=strip(now);if(e<s)return{years:0,months:0};
  let y=e.getFullYear()-s.getFullYear(),m=e.getMonth()-s.getMonth();if(e.getDate()<s.getDate())m--;
  if(m<0){y--;m+=12;}return{years:Math.max(0,y),months:m};}
function nextOcc(mo,day){const n=new Date();let c=new Date(n.getFullYear(),mo,day);if(strip(c)<strip(n))c=new Date(n.getFullYear()+1,mo,day);return c;}
function setVal(id,val,since){const el=document.getElementById(id);if(!el)return;
  if(since){const {years,months}=ym(since);el.textContent=`${val}日(${years}年${months}ヶ月)`;}else{el.textContent=`${val} 日`;}}
(function countAll(){
  const DEBUT=new Date(2021,2,21);
  setVal('days-since-debut',Math.max(0,daysSince(DEBUT)),DEBUT);
  setVal('days-to-birthday',daysDiff(nextOcc(0,7)));
  setVal('days-to-anniversary',daysDiff(nextOcc(2,21)));
  // 推してから: テスト用サンプル日付
  const OSHI=new Date(2024,0,1); const {years,months}=ym(OSHI);
  document.getElementById('days-to-meet').textContent=`${Math.max(0,daysSince(OSHI))}日(${years}年${months}ヶ月)`;
})();

/* ===== 次の予定 ===== */
const PERIOD={MORNING:'朝',NOON:'昼',EVENING:'夕方',NIGHT:'夜',LATE_NIGHT:'深夜'};
function pad(n){return String(n).padStart(2,'0');}
function nowNaiveJst(){const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;}
function fmtWhen(ev){
  const dt=new Date((ev.start_time||'').replace(' ','T'));
  const dstr=Number.isFinite(dt.getTime())
    ? dt.toLocaleDateString('ja-JP',{month:'long',day:'numeric',weekday:'short'})
    : (ev.start_time||'');
  if(ev.time_period && PERIOD[ev.time_period]) return `${dstr} ${PERIOD[ev.time_period]}ごろ`;
  const t=Number.isFinite(dt.getTime())?dt.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',hour12:false}):'';
  return t?`${dstr} ${t}`:dstr;
}
async function loadNext(){
  try{
    const from=encodeURIComponent(nowNaiveJst());
    const r=await fetch(`/api/events?from=${from}&status=scheduled&limit=10`,{credentials:'omit'});
    if(!r.ok) return;
    const j=await r.json();
    const items=(j.items||[]).filter(e=>e.start_time && e.event_type!=='memo' && e.status!=='cancelled');
    if(!items.length) return; // 予定なし→枠は非表示のまま
    const ev=items[0];
    document.getElementById('ne-title').textContent=ev.title||'配信予定';
    document.getElementById('ne-when').textContent=fmtWhen(ev);
    document.getElementById('ne-plat').textContent=ev.platform?`/ ${ev.platform}`:'';
    const link=document.getElementById('ne-link');
    if(ev.url){ link.href=ev.url; link.style.display='inline-block'; }
    document.getElementById('next-event').classList.add('show');
  }catch(e){ /* 失敗時は枠を出さない */ }
}
loadNext();
</script>
</body>
</html>
