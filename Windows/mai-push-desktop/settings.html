<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><title>設定 - Mai Push Desktop</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a2e;color:#eee;display:flex;justify-content:center;align-items:center;min-height:100vh}
.card{background:#16213e;padding:32px;border-radius:12px;width:360px;border:1px solid #2a2a4e}
h1{font-size:1.2em;margin-bottom:8px}
p{color:#888;font-size:0.9em;margin-bottom:20px}
label{display:block;font-size:0.85em;margin-bottom:4px;color:#aaa}
input[type=url]{width:100%;padding:8px 12px;border-radius:6px;border:1px solid #2a2a4e;background:#1a1a2e;color:#eee;font-size:0.95em;margin-bottom:16px}
button{padding:8px 24px;border:none;border-radius:6px;background:#e94560;color:#fff;cursor:pointer;font-size:0.95em}
button:hover{filter:brightness(1.1)}
#status{margin-top:12px;font-size:0.85em;color:#888}
</style>
</head>
<body>
<div class="card">
<h1>まいちゃん通知</h1>
<p>通知サーバーのURLを設定してください</p>
<label for="serverUrl">サーバーURL</label>
<input type="url" id="serverUrl" value="https://mai.honna-yuzuki.com" placeholder="https://example.com">
<button id="save">保存して開く</button>
<div id="status"></div>
</div>
<script>
const { ipcRenderer } = require('electron');
const btn = document.getElementById('save');
const input = document.getElementById('serverUrl');
const status = document.getElementById('status');

ipcRenderer.invoke('get-settings').then(s => {
  if (s && s.url) input.value = s.url;
});

btn.addEventListener('click', () => {
  const url = input.value.trim();
  if (!url) { status.textContent = 'URLを入力してください'; return; }
  btn.disabled = true;
  btn.textContent = '読み込み中...';
  ipcRenderer.invoke('save-url', url).then(() => {
    window.location.href = url;
  }).catch(e => {
    status.textContent = 'エラー: ' + e.message;
    btn.disabled = false;
    btn.textContent = '保存して開く';
  });
});
</script>
</div>
</body>
</html>
